
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myWatch</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased;font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif}

:root{
  --bg:#18181b;--surface:#27272a;--surface2:#2f2f33;--border:#3f3f46;--border2:#2d2d31;
  --fg:#f4f4f5;--fg2:#d4d4d8;--muted:#a1a1aa;--muted2:#71717a;
  --accent:#6366f1;--accent2:#818cf8;--accent-bg:rgba(99,102,241,.14);
  --r:10px;--rsm:6px;--rxs:4px;--pill:9999px;
  --amber:#fbbf24;--green:#4ade80;--blue:#60a5fa;--red:#f87171;--purple:#c084fc;--orange:#fb923c;
}

body{background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5}

/* ── Platform bar ── */
.pbar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:9999;
  display:flex;gap:3px;background:rgba(20,20,23,.9);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:var(--pill);padding:3px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.pbar-btn{padding:5px 14px;border-radius:var(--pill);border:none;background:transparent;
  color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.pbar-btn.active{background:var(--accent);color:#fff}
.pbar-btn:not(.active):hover{color:var(--fg);background:var(--surface)}

/* ── Scene containers ── */
.scene{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding-top:52px}

/* iOS scene */
body.plat-ios .scene{background:#111;align-items:center;justify-content:center;min-height:100vh;padding:52px 0 0}
body.plat-ios .ios-chrome{display:flex;flex-direction:column;width:393px;height:852px;
  border-radius:54px;background:#000;border:1px solid #444;overflow:hidden;position:relative;
  box-shadow:0 30px 80px rgba(0,0,0,.8),inset 0 0 0 1px rgba(255,255,255,.08)}
body.plat-ios .ios-status{display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px 0;height:54px;flex-shrink:0}
body.plat-ios .ios-time{font-size:15px;font-weight:700;letter-spacing:-.03em}
body.plat-ios .ios-notch{width:126px;height:34px;background:#000;border-radius:0 0 22px 22px;margin-top:-14px}
body.plat-ios .ios-icons{display:flex;align-items:center;gap:6px;color:var(--fg)}
body.plat-ios .ios-scroll{flex:1;overflow-y:auto;scrollbar-width:none}
body.plat-ios .ios-scroll::-webkit-scrollbar{display:none}
body.plat-ios .ios-home{height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
body.plat-ios .ios-home-pill{width:134px;height:5px;background:rgba(255,255,255,.35);border-radius:var(--pill)}
body.plat-ios .app{max-width:none;padding:0 16px 80px}
body.plat-ios .app-header{padding:14px 0 12px}

/* hide ios-chrome on non-ios */
body:not(.plat-ios) .ios-chrome{display:contents}
body:not(.plat-ios) .ios-status,.ios-notch,.ios-home{display:none}

/* Web scene */
body.plat-web .scene{padding-top:52px;align-items:flex-start;justify-content:flex-start;position:relative}
body.plat-web .app{max-width:620px;width:100%;padding:0 20px 80px;transition:max-width .3s}

/* ATV scene */
body.plat-atv .scene{background:#0a0a0c;min-height:100vh;align-items:flex-start;padding:52px 0 0}
body.plat-atv .app{width:100%;max-width:none;padding:0 60px 60px}
body.plat-atv .app-header{padding:24px 0}
body.plat-atv .page-title{font-size:32px;letter-spacing:-.04em}
body.plat-atv .wordmark{font-size:18px;padding:5px 12px}
body.plat-atv .filters{top:88px}
body.plat-atv .status-tabs{gap:8px}
body.plat-atv .status-tab{font-size:15px;padding:8px 18px}
body.plat-atv .type-btn{font-size:14px;padding:7px 16px}
body.plat-atv .sort-btn,.plat-atv .sync-btn{font-size:14px}
body.plat-atv .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-top:16px}
body.plat-atv .card{flex-direction:column;gap:0;padding:0;border-radius:12px;align-items:flex-start}
body.plat-atv .poster{width:100%;height:auto;aspect-ratio:2/3;border-radius:12px 12px 0 0}
body.plat-atv .poster svg{width:100%;height:100%}
body.plat-atv .card-body{padding:10px 12px 12px;gap:4px}
body.plat-atv .card-title{font-size:14px;white-space:normal;line-height:1.3}
body.plat-atv .card-meta{font-size:12px}
body.plat-atv .card-right{display:none}
body.plat-atv .card.atv-focus{outline:3px solid var(--accent);outline-offset:2px;box-shadow:0 0 0 6px rgba(99,102,241,.25);transform:scale(1.03)}
body.plat-atv .card:hover{transform:none;box-shadow:none}
body.plat-atv .card.atv-focus:hover{transform:scale(1.03)}

/* ── App shell ── */
.app{flex:1;min-width:0}

.app-header{display:flex;align-items:center;justify-content:space-between;
  padding:18px 0 14px;position:sticky;top:0;background:var(--bg);z-index:20;gap:12px}
.header-left{display:flex;align-items:center;gap:10px;min-width:0}
.wordmark{font-size:13px;font-weight:700;color:var(--accent2);letter-spacing:-.02em;
  white-space:nowrap;padding:3px 8px;background:var(--accent-bg);border-radius:var(--rxs)}
.page-title{font-size:17px;font-weight:700;letter-spacing:-.03em;color:var(--fg);
  display:flex;align-items:center;gap:7px;white-space:nowrap}
.title-count{font-size:11px;font-weight:600;color:var(--muted2);background:var(--surface);
  border:1px solid var(--border);border-radius:var(--pill);padding:1px 7px;font-variant-numeric:tabular-nums}
.header-nav{display:flex;align-items:center;gap:2px;flex-shrink:0}
.nav-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;
  border-radius:var(--rsm);color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .1s}
.nav-btn:hover{color:var(--fg);background:var(--surface)}
.nav-btn svg{display:block}
.avatar{width:30px;height:30px;border-radius:var(--pill);background:var(--accent-bg);
  border:1.5px solid var(--accent);color:var(--accent2);font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;margin-left:6px;flex-shrink:0}

/* ── Filters ── */
.filters{position:sticky;top:58px;background:var(--bg);z-index:10;
  padding-bottom:12px;border-bottom:1px solid var(--border2);margin-bottom:14px}
.status-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:2px 0 10px}
.status-tabs::-webkit-scrollbar{display:none}
.status-tab{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;
  border-radius:var(--pill);border:1px solid transparent;background:var(--surface);
  color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .12s}
.status-tab:hover{color:var(--fg2);border-color:var(--border)}
.status-tab.active{background:var(--accent);color:#fff;font-weight:600}
.tab-count{font-size:10px;font-weight:700;padding:1px 5px;border-radius:var(--pill);
  background:rgba(255,255,255,.15);line-height:1.5;min-width:18px;text-align:center}
.status-tab:not(.active) .tab-count{background:var(--border2);color:var(--muted2)}
.controls-row{display:flex;align-items:center;gap:8px}
.type-toggle{display:flex;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rsm);padding:2px;gap:1px}
.type-btn{padding:4px 10px;border-radius:var(--rxs);border:none;background:transparent;
  color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .1s;white-space:nowrap}
.type-btn:hover{color:var(--fg2)}
.type-btn.active{background:var(--surface2);color:var(--fg);font-weight:600}
.sort-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--rsm);
  border:1px solid var(--border);background:var(--surface);color:var(--muted);
  font-size:12px;font-weight:500;cursor:pointer;margin-left:auto;transition:all .1s;white-space:nowrap}
.sort-btn:hover{color:var(--fg2);border-color:var(--muted2)}
.sync-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:var(--rsm);
  border:1px solid transparent;background:transparent;color:var(--muted2);font-size:11px;cursor:pointer;transition:all .1s;white-space:nowrap}
.sync-btn:hover{color:var(--muted);background:var(--surface);border-color:var(--border2)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0}

/* ── List ── */
.list{display:flex;flex-direction:column;gap:5px}

/* ── Card ── */
.card{display:flex;gap:12px;padding:11px 12px;border-radius:var(--r);border:1px solid var(--border2);
  background:var(--surface);cursor:pointer;color:inherit;align-items:flex-start;
  transition:background .1s,border-color .12s,transform .12s,box-shadow .12s}
.card:hover{background:var(--surface2);border-color:var(--border);transform:translateY(-1px);
  box-shadow:0 2px 10px rgba(0,0,0,.25)}
.card:active{transform:translateY(0)}
.poster{flex-shrink:0;width:52px;height:78px;border-radius:var(--rsm);overflow:hidden}
.poster svg{display:block;width:100%;height:100%}
.card-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;padding-top:1px}
.card-title{font-size:14px;font-weight:600;letter-spacing:-.015em;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;color:var(--fg);line-height:1.25}
.card-meta{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted2);line-height:1;margin-bottom:2px}
.type-badge{font-size:9.5px;font-weight:800;letter-spacing:.06em;padding:1.5px 5px;
  border-radius:3px;text-transform:uppercase;line-height:1.3}
.type-badge.movie{background:rgba(251,146,60,.13);color:var(--orange)}
.type-badge.tv{background:rgba(168,85,247,.13);color:var(--purple)}
.card-status-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:1px}
.sbadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;
  padding:2px 7px;border-radius:var(--pill);line-height:1.4}
.sbadge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.sbadge.planned{background:rgba(96,165,250,.13);color:var(--blue)}
.sbadge.in_progress{background:rgba(251,191,36,.13);color:var(--amber)}
.sbadge.watched{background:rgba(74,222,128,.13);color:var(--green)}
.sbadge.quit{background:rgba(248,113,113,.13);color:var(--red)}
.progress-pill{font-size:11px;font-weight:500;color:var(--muted2);background:var(--bg);
  border:1px solid var(--border2);border-radius:var(--pill);padding:1.5px 7px;font-variant-numeric:tabular-nums}
.card-right{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;padding-top:2px}
.rating{font-size:13px;font-weight:700;color:var(--amber);display:flex;align-items:center;gap:2px;letter-spacing:-.01em}

/* ── Empty state ── */
.empty-state{display:flex;flex-direction:column;align-items:center;gap:12px;padding:64px 16px 48px;text-align:center}
.empty-icon{width:52px;height:52px;border-radius:13px;background:var(--surface);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted2)}
.empty-title{font-size:15px;font-weight:600;color:var(--fg2);letter-spacing:-.02em}
.empty-sub{font-size:13px;color:var(--muted2);max-width:220px;line-height:1.5;margin-top:-4px}

/* ── Detail: Web side panel ── */
.detail-panel{position:fixed;top:0;right:0;width:440px;height:100vh;background:var(--surface);
  border-left:1px solid var(--border);z-index:100;overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.detail-panel.open{transform:translateX(0)}
.detail-panel::-webkit-scrollbar{width:4px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--pill)}
body.plat-ios .detail-panel{display:none}
body.plat-atv .detail-panel{display:none}

/* ── Detail: iOS bottom sheet ── */
.ios-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:393px;max-height:88vh;background:var(--surface);border-radius:24px 24px 0 0;
  z-index:200;overflow-y:auto;scrollbar-width:none;
  transition:transform .32s cubic-bezier(.4,0,.2,1);display:none}
.ios-sheet::-webkit-scrollbar{display:none}
body.plat-ios .ios-sheet{display:block}
body.plat-ios .ios-sheet.open{transform:translateX(-50%) translateY(0)}
.sheet-drag{display:flex;justify-content:center;padding:12px 0 4px;flex-shrink:0;position:sticky;top:0;background:var(--surface);z-index:1;border-radius:24px 24px 0 0}
.sheet-drag-pill{width:36px;height:4px;background:var(--border);border-radius:var(--pill)}

/* ── Detail: ATV fullscreen overlay ── */
.atv-overlay{position:fixed;inset:0;background:#0a0a0c;z-index:300;
  opacity:0;pointer-events:none;transition:opacity .2s;overflow-y:auto;display:none}
body.plat-atv .atv-overlay{display:block}
.atv-overlay.open{opacity:1;pointer-events:all}

/* ── Detail content (shared) ── */
.detail-hero{position:relative;width:100%;aspect-ratio:3/2;max-height:300px;overflow:hidden;flex-shrink:0}
.detail-hero svg{width:100%;height:100%;display:block}
.detail-hero-gradient{position:absolute;bottom:0;left:0;right:0;height:60%;
  background:linear-gradient(to bottom,transparent,var(--surface))}
.detail-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;z-index:2}
.detail-close:hover{background:rgba(0,0,0,.8)}
.detail-body{padding:0 20px 32px;display:flex;flex-direction:column;gap:16px}
.detail-title{font-size:22px;font-weight:800;letter-spacing:-.04em;line-height:1.15;color:var(--fg)}
.detail-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.detail-year{font-size:13px;color:var(--muted);font-weight:500}
.detail-sep{color:var(--border);font-size:12px}
.detail-runtime{font-size:13px;color:var(--muted);font-weight:500}
.detail-platform{font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px;
  background:rgba(255,255,255,.08);color:var(--fg2);letter-spacing:.04em;text-transform:uppercase}
.detail-rating-row{display:flex;align-items:center;gap:10px}
.detail-stars{color:var(--amber);font-size:14px;letter-spacing:1px}
.detail-score{font-size:16px;font-weight:800;color:var(--amber);letter-spacing:-.02em}
.detail-imdb{font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;background:#f5c518;color:#000;letter-spacing:.01em}
.detail-synopsis{font-size:14px;color:var(--fg2);line-height:1.6}
.detail-section-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-bottom:6px}
.genre-chips{display:flex;flex-wrap:wrap;gap:5px}
.genre-chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:var(--pill);
  background:var(--surface2);border:1px solid var(--border);color:var(--fg2)}
.cast-list{display:flex;flex-direction:column;gap:6px}
.cast-item{display:flex;align-items:center;gap:10px}
.cast-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:rgba(255,255,255,.6);flex-shrink:0}
.cast-name{font-size:13px;font-weight:600;color:var(--fg2)}
.cast-role{font-size:11px;color:var(--muted2)}
.detail-progress{display:flex;flex-direction:column;gap:6px}
.progress-bar-bg{height:4px;background:var(--border2);border-radius:var(--pill);overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:var(--pill)}
.progress-text{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.detail-actions{display:flex;gap:8px;flex-direction:column}
.action-primary{padding:12px 20px;border-radius:var(--rsm);border:none;background:var(--accent);
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .1s;text-align:center}
.action-primary:hover{background:#4f46e5}
.action-row{display:flex;gap:8px}
.action-secondary{flex:1;padding:10px 12px;border-radius:var(--rsm);border:1px solid var(--border);
  background:transparent;color:var(--fg2);font-size:13px;font-weight:500;cursor:pointer;transition:all .1s;text-align:center}
.action-secondary:hover{background:var(--surface2);border-color:var(--muted2)}
.action-danger{flex:1;padding:10px 12px;border-radius:var(--rsm);border:1px solid rgba(248,113,113,.3);
  background:transparent;color:var(--red);font-size:13px;font-weight:500;cursor:pointer;transition:all .1s;text-align:center}
.action-danger:hover{background:rgba(248,113,113,.08)}

/* ATV back button */
.atv-back{display:inline-flex;align-items:center;gap:8px;padding:8px 0;
  color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;margin-bottom:8px}
.atv-back:hover{color:var(--fg)}

/* ── Scrim ── */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;opacity:0;
  pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px)}
.scrim.show{opacity:1;pointer-events:all}
body.plat-atv .scrim{display:none}
</style>
</head>
<body class="plat-web">

<div class="pbar" id="pbar">
  <button class="pbar-btn" data-plat="ios">📱 iOS</button>
  <button class="pbar-btn active" data-plat="web">🖥 Web</button>
  <button class="pbar-btn" data-plat="atv">📺 Android TV</button>
</div>

<div class="scene" id="scene">
<div class="ios-chrome" id="ios-chrome">
  <div class="ios-status" id="ios-status">
    <span class="ios-time">9:41</span>
    <div class="ios-notch"></div>
    <div class="ios-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="3" width="3" height="9" rx="1" opacity=".4"/><rect x="4" y="2" width="3" height="10" rx="1" opacity=".6"/><rect x="8" y="0" width="3" height="12" rx="1"/><rect x="12" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="16" height="12" viewBox="0 0 18 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 4c4.4-5.3 11.6-5.3 16 0"/><path d="M3.5 7c3-3.7 8-3.7 11 0"/><circle cx="9" cy="10.5" r="1.5" fill="currentColor" stroke="none"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="22" height="11" rx="3.5" stroke="currentColor" stroke-opacity=".35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="currentColor"/><path d="M23 4v4c1.1-.5 1.1-3.5 0-4z" fill="currentColor" opacity=".4"/></svg>
    </div>
  </div>
  <div class="ios-scroll" id="ios-scroll">

<div class="app" id="app">
  <header class="app-header">
    <div class="header-left">
      <span class="wordmark">myWatch</span>
      <h1 class="page-title">My List <span class="title-count" id="total-count">8</span></h1>
    </div>
    <nav class="header-nav">
      <button class="nav-btn"><svg width="17" height="17" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17.5" y2="17.5"/></svg></button>
      <button class="nav-btn"><svg width="17" height="17" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="8"/><polygon points="8.5,7.5 13.5,10 8.5,12.5 6,10" fill="currentColor" stroke="none"/></svg></button>
      <div class="avatar">R</div>
    </nav>
  </header>

  <div class="filters">
    <div class="status-tabs" id="status-tabs">
      <button class="status-tab active" data-status="all">All <span class="tab-count" id="count-all">8</span></button>
      <button class="status-tab" data-status="planned">Planned <span class="tab-count" id="count-planned">0</span></button>
      <button class="status-tab" data-status="in_progress">In Progress <span class="tab-count" id="count-in_progress">0</span></button>
      <button class="status-tab" data-status="watched">Watched <span class="tab-count" id="count-watched">0</span></button>
      <button class="status-tab" data-status="quit">Quit <span class="tab-count" id="count-quit">0</span></button>
    </div>

const STATUS_LABELS={planned:'Planned',in_progress:'In Progress',watched:'Watched',quit:'Quit'};
const SORT_OPTIONS=[{v:'updated',l:'Recently Updated'},{v:'rating',l:'Top Rated'},{v:'title',l:'A – Z'}];

function posterSVG(item,w,h){
  const id='g'+item.id+'_'+w;
  const motifs={
    waves:`<path d="M0,${h*.35} Q${w*.2},${h*.28} ${w*.4},${h*.35} T${w*.8},${h*.35} T${w*1.2},${h*.35}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="2"/><path d="M0,${h*.5} Q${w*.25},${h*.43} ${w*.5},${h*.5} T${w},${h*.5}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1.5"/><ellipse cx="${w*.5}" cy="${h*.28}" rx="${w*.3}" ry="${h*.06}" fill="rgba(255,200,100,.05)"/>`,
    spores:(()=>{let s='';[[.2,.25,2],[.6,.2,1.5],[.4,.45,3],[.15,.55,1.5],[.75,.4,2],[.5,.65,2.5],[.3,.7,1],[.8,.6,2],[.65,.75,1.5]].forEach(([x,y,r])=>{s+=`<circle cx="${w*x}" cy="${h*y}" r="${r}" fill="rgba(255,255,255,.12)"/><circle cx="${w*x}" cy="${h*y}" r="${r*2.5}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;});return s;})(),
    radial:(()=>{let s=`<circle cx="${w*.5}" cy="${h*.35}" r="${w*.2}" fill="rgba(255,200,50,.05)"/>`;for(let i=0;i<12;i++){const a=i*30*Math.PI/180,x1=w*.5+Math.cos(a)*w*.1,y1=h*.35+Math.sin(a)*h*.07,x2=w*.5+Math.cos(a)*w*.42,y2=h*.35+Math.sin(a)*h*.28;s+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,200,50,.08)" stroke-width="1"/>`;}return s;})(),
    grid:(()=>{let s='';for(let i=1;i<6;i++)s+=`<line x1="${w*i/6}" y1="0" x2="${w*i/6}" y2="${h}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;for(let i=1;i<9;i++)s+=`<line x1="0" y1="${h*i/9}" x2="${w}" y2="${h*i/9}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`;return s;})(),
    bokeh:(()=>{let s='';[[.3,.3,w*.1],[.7,.4,w*.07],[.2,.6,w*.05],[.6,.65,w*.09],[.5,.2,w*.04],[.8,.25,w*.06]].forEach(([x,y,r])=>{s+=`<circle cx="${w*x}" cy="${h*y}" r="${r}" fill="rgba(255,255,255,.04)"/>`;});return s;})(),
    diamond:(()=>{let s='';const sz=w*.09;for(let row=0;row<9;row++)for(let col=0;col<5;col++){const x=col*sz*2+(row%2)*sz,y=row*sz*1.4-sz;s+=`<polygon points="${x+sz},${y} ${x+sz*2},${y+sz*.7} ${x+sz},${y+sz*1.4} ${x},${y+sz*.7}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width=".8"/>`;} return s;})(),
    rain:(()=>{let s='';const rng=(seed)=>{let x=Math.sin(seed)*10000;return x-Math.floor(x);};for(let i=0;i<18;i++){const x=rng(i*3)*w,y=rng(i*3+1)*h*.6,l=10+rng(i*3+2)*20;s+=`<line x1="${x}" y1="${y}" x2="${x-l*.1}" y2="${y+l}" stroke="rgba(255,255,255,.07)" stroke-width=".8"/>`;} return s;})(),
    swirl:`<path d="M${w*.5},${h*.3} C${w*.72},${h*.18} ${w*.82},${h*.42} ${w*.5},${h*.52} C${w*.18},${h*.62} ${w*.12},${h*.38} ${w*.32},${h*.28} C${w*.52},${h*.18} ${w*.7},${h*.35} ${w*.5},${h*.52}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="2"/>`,
  };
  const words=item.title.split(' ');
  const mainWord=words[0].toUpperCase();
  const subWord=words.slice(1).join(' ').toUpperCase().substring(0,14);
  const titleY=h*.8;
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="${id}" x1="0" y1="0" x2=".4" y2="1"><stop offset="0%" stop-color="${item.c1}"/><stop offset="100%" stop-color="${item.c2}"/></linearGradient><linearGradient id="${id}o" x1="0" y1=".5" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,0,0,0)"/><stop offset="100%" stop-color="rgba(0,0,0,.75)"/></linearGradient></defs><rect width="${w}" height="${h}" fill="url(#${id})"/>${motifs[item.motif]||''}<rect width="${w}" height="${h}" fill="url(#${id}o)"/><text x="${w/2}" y="${titleY}" text-anchor="middle" fill="rgba(255,255,255,.92)" font-size="${Math.min(w*.14,24)}" font-weight="900" font-family="system-ui,-apple-system,sans-serif" letter-spacing="0.04em">${mainWord}</text>${subWord?`<text x="${w/2}" y="${titleY+h*.09}" text-anchor="middle" fill="rgba(255,255,255,.55)" font-size="${Math.min(w*.065,11)}" font-weight="600" font-family="system-ui,-apple-system,sans-serif" letter-spacing="0.1em">${subWord}</text>`:''}<rect x="0" y="${h*.93}" width="${w}" height="${h*.07}" fill="rgba(0,0,0,.4)"/><text x="${w*.05}" y="${h*.975}" fill="rgba(255,255,255,.45)" font-size="${Math.min(w*.055,9)}" font-weight="700" font-family="system-ui,sans-serif" letter-spacing=".08em">${item.type==='movie'?'FILM':'TV SERIES'}</text></svg>`;
}

function renderDetailContent(item,platform){
  const stars='★'.repeat(item.rating?Math.round(item.rating/2):0)+'☆'.repeat(item.rating?5-Math.round(item.rating/2):5);
  const progress=(item.type==='tv'&&item.season&&item.episodes)?Math.min(Math.round(((item.season-1)*item.episodes+(item.episode||0))/(item.episodes*2)*100),95):null;
  const actionLabel=item.status==='watched'?'▶ Watch Again':item.status==='in_progress'?`▶ Continue S${item.season} E${item.episode}`:'▶ Start Watching';
  const castHtml=item.cast.map(c=>`<div class="cast-item"><div class="cast-avatar" style="background:${c.a}">${c.n[0]}</div><div><div class="cast-name">${c.n}</div><div class="cast-role">${c.r}</div></div></div>`).join('');
  const genreHtml=item.genres.map(g=>`<span class="genre-chip">${g}</span>`).join('');
  const ratingHtml=item.rating?`<div class="detail-rating-row"><div class="detail-stars">${stars}</div><span class="detail-score">${item.rating}/10</span>${item.imdb?`<span class="detail-imdb">IMDb ${item.imdb}</span>`:''}</div>`:'';
  const progressHtml=progress!==null?`<div class="detail-progress"><div class="detail-section-label">Progress — Season ${item.season}, Episode ${item.episode}</div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${progress}%"></div></div><div class="progress-text">${progress}% complete</div></div>`:'';

  if(platform==='atv'){
    return `<button class="atv-back" onclick="closeDetail()">← Back to List</button>
      <div style="display:flex;gap:60px;padding:0 80px 60px;max-width:1300px;margin:0 auto">
        <div style="flex-shrink:0;width:260px;height:390px;border-radius:14px;overflow:hidden">${posterSVG(item,260,390)}</div>
        <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:18px;padding-top:16px">
          <div class="detail-title" style="font-size:34px">${item.title}</div>
          <div class="detail-meta-row"><span class="detail-year">${item.year}</span><span class="detail-sep">·</span><span class="detail-runtime">${item.type==='tv'?`${item.episodes} episodes · ${item.runtime}`:`${item.runtime}`}</span><span class="detail-platform">${item.platform}</span></div>
          ${ratingHtml}
          <div class="detail-synopsis" style="font-size:15px">${item.synopsis}</div>
          <div><div class="detail-section-label">Genres</div><div class="genre-chips">${genreHtml}</div></div>
          <div><div class="detail-section-label">Cast</div><div class="cast-list">${item.cast.slice(0,3).map(c=>`<div class="cast-item"><div class="cast-avatar" style="background:${c.a}">${c.n[0]}</div><div><div class="cast-name">${c.n}</div><div class="cast-role">${c.r}</div></div></div>`).join('')}</div></div>
          ${progressHtml}
          <div style="display:flex;gap:12px;margin-top:8px"><button class="action-primary" style="flex:2;padding:14px 24px;font-size:15px">${actionLabel}</button><button class="action-secondary" style="flex:1;font-size:14px" onclick="closeDetail()">✕ Close</button></div>
        </div>
      </div>`;
  }

  const heroW=platform==='ios'?393:440;
  return `<div class="detail-hero">${posterSVG(item,heroW,280)}<div class="detail-hero-gradient"></div><button class="detail-close" onclick="closeDetail()">✕</button></div>
    <div class="detail-body">
      <div><div class="detail-title">${item.title}</div><div class="detail-meta-row" style="margin-top:6px"><span class="detail-year">${item.year}</span><span class="detail-sep">·</span><span class="detail-runtime">${item.type==='tv'?`${item.episodes} eps · ${item.runtime}`:`${item.runtime}`}</span><span class="detail-platform">${item.platform}</span></div></div>
      ${ratingHtml}
      <div class="detail-synopsis">${item.synopsis}</div>
      <div><div class="detail-section-label">Genres</div><div class="genre-chips">${genreHtml}</div></div>
      <div><div class="detail-section-label">Director</div><div style="font-size:13px;color:var(--fg2)">${item.director}</div></div>
      <div><div class="detail-section-label">Cast</div><div class="cast-list">${castHtml}</div></div>
      ${progressHtml}
      <div class="detail-actions"><button class="action-primary">${actionLabel}</button><div class="action-row"><button class="action-secondary">Edit Status</button><button class="action-danger">Remove</button></div></div>
    </div>`;
}

function renderCard(item,idx){
  const progress=(item.type==='tv'&&item.season!=null)?`<span class="progress-pill">S${item.season}·E${item.episode??'?'}</span>`:'';
  const ratingCol=item.rating!=null?`<div class="card-right"><div class="rating">★${item.rating}</div></div>`:'';
  return `<div class="card" data-id="${item.id}" data-idx="${idx}"><div class="poster">${posterSVG(item,52,78)}</div><div class="card-body"><div class="card-title">${item.title}</div><div class="card-meta"><span>${item.year}</span><span style="opacity:.4"> · </span><span class="type-badge ${item.type}">${item.type==='movie'?'Movie':'TV'}</span></div><div class="card-status-row"><span class="sbadge ${item.status}"><span class="sbadge-dot"></span>${STATUS_LABELS[item.status]}</span>${progress}</div></div>${ratingCol}</div>`;
}

function renderEmpty(){return`<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="15" height="14" rx="2"/><polyline points="17 8 22 8 22 19 7 19 7 17"/><line x1="7" y1="8" x2="12" y2="8"/><line x1="7" y1="11.5" x2="14" y2="11.5"/></svg></div><div class="empty-title">Nothing here yet</div><div class="empty-sub">Try a different filter or add something to watch</div></div>`;}

let statusFilter='all',typeFilter='all',sortIndex=0,currentPlatform='web',atvFocusIndex=0;

function getFiltered(){
  let list=ITEMS;
  if(statusFilter!=='all')list=list.filter(i=>i.status===statusFilter);
  if(typeFilter!=='all')list=list.filter(i=>i.type===typeFilter);
  const s=SORT_OPTIONS[sortIndex].v;
  return [...list].sort((a,b)=>s==='rating'?(b.rating||0)-(a.rating||0):s==='title'?a.title.localeCompare(b.title):b.updatedAt.localeCompare(a.updatedAt));
}

function openDetail(item){
  const html=renderDetailContent(item,currentPlatform);
  if(currentPlatform==='web'){document.getElementById('detail-panel').innerHTML=html;document.getElementById('detail-panel').classList.add('open');document.getElementById('scrim').classList.add('show');}
  else if(currentPlatform==='ios'){document.getElementById('ios-sheet-body').innerHTML=html;document.getElementById('ios-sheet').classList.add('open');document.getElementById('scrim').classList.add('show');}
  else if(currentPlatform==='atv'){document.getElementById('atv-overlay').innerHTML=`<div style="padding:60px 0 0">${html}</div>`;document.getElementById('atv-overlay').classList.add('open');}
}
function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('ios-sheet').classList.remove('open');
  document.getElementById('atv-overlay').classList.remove('open');
  document.getElementById('scrim').classList.remove('show');
}

function updateCounts(){
  document.getElementById('count-all').textContent=ITEMS.length;
  ['planned','in_progress','watched','quit'].forEach(s=>document.getElementById('count-'+s).textContent=ITEMS.filter(i=>i.status===s).length);
}

function updateAtvFocus(filtered){
  document.querySelectorAll('.card').forEach((el,i)=>el.classList.toggle('atv-focus',i===atvFocusIndex));
}

function render(){
  const filtered=getFiltered();
  const listEl=document.getElementById('list');
  listEl.innerHTML=filtered.length===0?renderEmpty():filtered.map((item,i)=>renderCard(item,i)).join('');
  document.getElementById('total-count').textContent=filtered.length;
  updateCounts();
  if(currentPlatform==='atv'){atvFocusIndex=Math.min(atvFocusIndex,Math.max(0,filtered.length-1));updateAtvFocus(filtered);}
  listEl.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click',()=>{const item=ITEMS.find(i=>i.id===+el.dataset.id);if(item)openDetail(item);});
  });
}

document.addEventListener('keydown',e=>{
  if(currentPlatform!=='atv')return;
  if(document.getElementById('atv-overlay').classList.contains('open')){if(e.key==='Escape'||e.key==='Backspace')closeDetail();return;}
  const filtered=getFiltered();
  const cols=Math.max(1,Math.floor((window.innerWidth-120)/216));
  if(e.key==='ArrowRight'){atvFocusIndex=Math.min(atvFocusIndex+1,filtered.length-1);updateAtvFocus(filtered);e.preventDefault();}
  if(e.key==='ArrowLeft'){atvFocusIndex=Math.max(atvFocusIndex-1,0);updateAtvFocus(filtered);e.preventDefault();}
  if(e.key==='ArrowDown'){atvFocusIndex=Math.min(atvFocusIndex+cols,filtered.length-1);updateAtvFocus(filtered);e.preventDefault();}
  if(e.key==='ArrowUp'){atvFocusIndex=Math.max(atvFocusIndex-cols,0);updateAtvFocus(filtered);e.preventDefault();}
  if(e.key==='Enter'){const item=filtered[atvFocusIndex];if(item)openDetail(item);}
});

function setPlatform(plat){
  closeDetail();currentPlatform=plat;
  document.body.className='plat-'+plat;
  document.querySelectorAll('.pbar-btn').forEach(b=>b.classList.toggle('active',b.dataset.plat===plat));
  const iosStatus=document.getElementById('ios-status'),iosHome=document.getElementById('ios-home');
  iosStatus.style.display=plat==='ios'?'flex':'none';
  iosHome.style.display=plat==='ios'?'flex':'none';
  render();
}

document.getElementById('status-tabs').addEventListener('click',e=>{const btn=e.target.closest('.status-tab');if(!btn)return;statusFilter=btn.dataset.status;document.querySelectorAll('.status-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();});
document.getElementById('type-toggle').addEventListener('click',e=>{const btn=e.target.closest('.type-btn');if(!btn)return;typeFilter=btn.dataset.type;document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();});
document.getElementById('sort-btn').addEventListener('click',()=>{sortIndex=(sortIndex+1)%SORT_OPTIONS.length;document.getElementById('sort-label').textContent=SORT_OPTIONS[sortIndex].l;render();});
document.getElementById('sync-btn').addEventListener('click',function(){this.innerHTML='Syncing…';setTimeout(()=>{this.innerHTML='<span class="sync-dot"></span>Synced just now'},1200);});
