services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mywatch
      POSTGRES_USER: mywatch
      POSTGRES_PASSWORD: mywatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${PORT_DB:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mywatch -d mywatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mywatch:mywatch@postgres:5432/mywatch
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      PORT: ${PORT_API:-3001}
    ports:
      - "${PORT_API:-3001}:${PORT_API:-3001}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT_API:-3001}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${PORT_API:-3001}}
        NEXT_PUBLIC_TMDB_API_KEY: ${NEXT_PUBLIC_TMDB_API_KEY:?NEXT_PUBLIC_TMDB_API_KEY is required — set it in .env}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      PORT: ${PORT_WEB:-3000}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required — set it in .env}
      AUTH_URL: ${AUTH_URL:-http://localhost:${PORT_WEB:-3000}}
      # Server-side URL for Next.js → API calls inside Docker network
      INTERNAL_API_URL: http://api:${PORT_API:-3001}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_ID: ${APPLE_ID:-}
      APPLE_SECRET: ${APPLE_SECRET:-}
    ports:
      - "${PORT_WEB:-3000}:${PORT_WEB:-3000}"

volumes:
  postgres_data:
